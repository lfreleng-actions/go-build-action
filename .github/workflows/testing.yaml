---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test builds against the synthetic Go fixture ###
  test-synthetic:
    name: "Test: synthetic fixture (test-go-project)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d # v0.2.1
        with:
          config: '@807a544b7e55a9224b2b3780e636467bd4b5b99b' # v0.5.0

      # Harden the runner with the just-loaded allow-list.
      - name: "Harden runner (block)"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Checkout test project: lfreleng-actions/test-go-project"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lfreleng-actions/test-go-project
          ref: a77c5ec773edc266ddcc3c1d1c306e7bb3f12c30
          path: test-project
          persist-credentials: false

      # The pinned fixture commit imports pkg/calculator, but the
      # package never made it into the tree (masked by a .gitignore
      # entry). Restore a minimal implementation so build and test
      # operations succeed; drop this step once the fixture repo
      # gains the package upstream.
      - name: "Restore missing fixture package"
        shell: bash
        run: |
          # Restore missing fixture package
          mkdir -p test-project/pkg/calculator
          cat > test-project/pkg/calculator/calculator.go << 'EOF'
          // SPDX-License-Identifier: Apache-2.0
          // SPDX-FileCopyrightText: 2026 The Linux Foundation

          package calculator

          import "errors"

          type Calculator struct{}

          func New() *Calculator { return &Calculator{} }

          func (c *Calculator) Add(a, b float64) float64 { return a + b }

          func (c *Calculator) Subtract(a, b float64) float64 {
              return a - b
          }

          func (c *Calculator) Multiply(a, b float64) float64 {
              return a * b
          }

          func (c *Calculator) Divide(a, b float64) (float64, error) {
              if b == 0 {
                  return 0, errors.New("division by zero")
              }
              return a / b, nil
          }
          EOF
          cat > test-project/pkg/calculator/calculator_test.go << 'EOF'
          // SPDX-License-Identifier: Apache-2.0
          // SPDX-FileCopyrightText: 2026 The Linux Foundation

          package calculator

          import "testing"

          func TestOperations(t *testing.T) {
              c := New()
              if got := c.Add(2, 3); got != 5 {
                  t.Fatalf("Add: got %v", got)
              }
              if got := c.Subtract(5, 3); got != 2 {
                  t.Fatalf("Subtract: got %v", got)
              }
              if got := c.Multiply(4, 3); got != 12 {
                  t.Fatalf("Multiply: got %v", got)
              }
              if got, err := c.Divide(10, 4); err != nil || got != 2.5 {
                  t.Fatalf("Divide: got %v err %v", got, err)
              }
              if _, err := c.Divide(1, 0); err == nil {
                  t.Fatal("Divide by zero: expected error")
              }
          }
          EOF
          echo "Fixture package restored ✅"

      - name: "Running local action: validation build"
        id: default-build
        uses: ./
        with:
          path_prefix: test-project

      - name: "Running local action: named binary build"
        id: binary-build
        uses: ./
        with:
          path_prefix: test-project
          build_target: '.'
          output_name: calculator
          build_flags: '-trimpath'
          ldflags: '-s -w'

      - name: "Running local action: cross-compiled build"
        id: cross-build
        uses: ./
        with:
          path_prefix: test-project
          go_version: '1.25.11'
          build_target: '.'
          goos: linux
          goarch: arm64
          output_name: calculator-linux-arm64

      - name: "Running local action: artifact upload"
        id: artifact-build
        uses: ./
        with:
          path_prefix: test-project
          build_target: '.'
          output_name: calculator-artifact
          artifact_upload: 'true'
          artifact_name: go-build-test-binary

      - name: "Verify build outputs"
        shell: bash
        env:
          DEFAULT_VERSION: >-
            ${{ steps.default-build.outputs.go_version_used }}
          DEFAULT_BINARY: ${{ steps.default-build.outputs.binary_path }}
          BINARY_PATH: ${{ steps.binary-build.outputs.binary_path }}
          CROSS_BINARY: ${{ steps.cross-build.outputs.binary_path }}
          CROSS_VERSION: ${{ steps.cross-build.outputs.go_version_used }}
        run: |
          # Verify build outputs
          errors=0
          if [ -z "${DEFAULT_VERSION}" ]; then
            echo "Validation build: go_version_used empty ❌"
            errors=1
          fi
          if [ -n "${DEFAULT_BINARY}" ]; then
            echo "Validation build: unexpected binary_path ❌"
            errors=1
          fi
          if [ ! -x "${BINARY_PATH}" ]; then
            echo "Named build: binary missing: ${BINARY_PATH} ❌"
            errors=1
          elif ! "${BINARY_PATH}" add 2 3 | grep -q 'Result: 5.00'; then
            echo "Named build: binary produced wrong output ❌"
            errors=1
          fi
          if [ ! -f "${CROSS_BINARY}" ]; then
            echo "Cross build: binary missing: ${CROSS_BINARY} ❌"
            errors=1
          fi
          case "${CROSS_VERSION}" in
            1.25.11) ;;
            *)
              echo "Cross build: go_version not honoured ❌"
              echo "Reported version: ${CROSS_VERSION}"
              errors=1 ;;
          esac
          if [ "${errors}" != "0" ]; then
            echo "Build verification failed ❌" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Build outputs verified ✅"
          echo "Build outputs verified ✅" >> "$GITHUB_STEP_SUMMARY"

  ### Test builds against a real Gerrit-mirrored monorepo ###
  test-real:
    name: "Test: real fixture (onap/multicloud-k8s)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d # v0.2.1
        with:
          config: '@807a544b7e55a9224b2b3780e636467bd4b5b99b' # v0.5.0

      # Harden the runner with the just-loaded allow-list.
      - name: "Harden runner (block)"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Checkout test project: onap/multicloud-k8s"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: onap/multicloud-k8s
          ref: 5c3b1a96811024e65b0977305b6d6737a6e2d453
          path: test-project
          persist-credentials: false

      # The module's go.mod predates the go directive conventions the
      # current toolchain expects (go 1.16), so the build passes an
      # explicit modern Go version
      - name: "Running local action: nested module binary"
        id: module-build
        uses: ./
        with:
          path_prefix: test-project/src/k8splugin
          go_version: '1.25.11'
          build_target: './cmd'
          output_name: k8splugin

      - name: "Running local action: nested module validation build"
        id: library-build
        uses: ./
        with:
          path_prefix: test-project/src/k8splugin
          go_version: '1.25.11'
          build_target: './internal/...'

      - name: "Verify nested module build outputs"
        shell: bash
        env:
          MODULE_BINARY: ${{ steps.module-build.outputs.binary_path }}
          LIBRARY_VERSION: >-
            ${{ steps.library-build.outputs.go_version_used }}
        run: |
          # Verify nested module build outputs
          errors=0
          if [ ! -x "${MODULE_BINARY}" ]; then
            echo "Module build: binary missing: ${MODULE_BINARY} ❌"
            errors=1
          fi
          case "${MODULE_BINARY}" in
            */test-project/src/k8splugin/k8splugin) ;;
            *)
              echo "Module build: unexpected path: ${MODULE_BINARY} ❌"
              errors=1 ;;
          esac
          if [ -z "${LIBRARY_VERSION}" ]; then
            echo "Library build: go_version_used empty ❌"
            errors=1
          fi
          if [ "${errors}" != "0" ]; then
            echo "Real fixture verification failed ❌" \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Real fixture builds verified ✅"
          echo "Real fixture builds verified ✅" >> "$GITHUB_STEP_SUMMARY"

  ### Test invalid inputs fail closed ###
  test-failures:
    name: "Test: invalid inputs and error handling"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d # v0.2.1
        with:
          config: '@807a544b7e55a9224b2b3780e636467bd4b5b99b' # v0.5.0

      # Harden the runner with the just-loaded allow-list.
      - name: "Harden runner (block)"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: "Checkout repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Running local action with shell metacharacter flags"
        id: bad-flags
        continue-on-error: true
        uses: ./
        with:
          build_flags: '-x; id'

      - name: "Running local action with command substitution ldflags"
        id: bad-ldflags
        continue-on-error: true
        uses: ./
        with:
          ldflags: '-X main.version=$(id)'

      - name: "Running local action with unsupported goos/goarch"
        id: bad-platform
        continue-on-error: true
        uses: ./
        with:
          goos: solaris
          goarch: amd64

      - name: "Running local action with goos but no goarch"
        id: half-platform
        continue-on-error: true
        uses: ./
        with:
          goos: linux

      - name: "Running local action with invalid cgo_enabled"
        id: bad-cgo
        continue-on-error: true
        uses: ./
        with:
          cgo_enabled: '2'

      - name: "Running local action with workspace-escaping path"
        id: escape-path
        continue-on-error: true
        uses: ./
        with:
          path_prefix: /etc

      - name: "Running local action with unsafe output name"
        id: bad-output
        continue-on-error: true
        uses: ./
        with:
          output_name: '../escape'

      - name: "Running local action with invalid boolean"
        id: bad-bool
        continue-on-error: true
        uses: ./
        with:
          artifact_upload: 'yes'

      - name: "Running local action with upload but no output name"
        id: upload-no-output
        continue-on-error: true
        uses: ./
        with:
          artifact_upload: 'true'

      - name: "Running local action with flag-like build target"
        id: bad-target
        continue-on-error: true
        uses: ./
        with:
          build_target: '-x'

      - name: "Verify invalid inputs were rejected"
        shell: bash
        env:
          FLAGS_OUTCOME: ${{ steps.bad-flags.outcome }}
          LDFLAGS_OUTCOME: ${{ steps.bad-ldflags.outcome }}
          PLATFORM_OUTCOME: ${{ steps.bad-platform.outcome }}
          HALF_PLATFORM_OUTCOME: ${{ steps.half-platform.outcome }}
          CGO_OUTCOME: ${{ steps.bad-cgo.outcome }}
          ESCAPE_OUTCOME: ${{ steps.escape-path.outcome }}
          OUTPUT_OUTCOME: ${{ steps.bad-output.outcome }}
          BOOL_OUTCOME: ${{ steps.bad-bool.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload-no-output.outcome }}
          TARGET_OUTCOME: ${{ steps.bad-target.outcome }}
        run: |
          # Failure testing is also important; all steps MUST fail
          errors=0
          for outcome_pair in \
            "flags:${FLAGS_OUTCOME}" \
            "ldflags:${LDFLAGS_OUTCOME}" \
            "platform:${PLATFORM_OUTCOME}" \
            "half-platform:${HALF_PLATFORM_OUTCOME}" \
            "cgo:${CGO_OUTCOME}" \
            "escape:${ESCAPE_OUTCOME}" \
            "output:${OUTPUT_OUTCOME}" \
            "bool:${BOOL_OUTCOME}" \
            "upload:${UPLOAD_OUTCOME}" \
            "target:${TARGET_OUTCOME}"; do
            test_name="${outcome_pair%%:*}"
            outcome="${outcome_pair#*:}"
            if [ "${outcome}" = "success" ]; then
              echo "Invalid ${test_name} unexpectedly succeeded ❌"
              errors=1
            fi
          done
          if [ "${errors}" != "0" ]; then
            echo "Failure-path tests failed ❌" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Invalid inputs correctly rejected ✅"
          echo "Invalid inputs correctly rejected ✅" \
            >> "$GITHUB_STEP_SUMMARY"
